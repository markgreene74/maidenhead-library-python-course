name: update_readme

on:
  push:
    branches: [ main ]

  # run the workflow every Saturday and Sunday at 07:00
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 6,0'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      work-dir: ./modules

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install dependencies
        working-directory: ${{ env.work-dir }}
        run: |
          python -m pip install "jinja2==3.1.6"
      - name: Update README
        working-directory: ${{ env.work-dir }}
        run: |-
          python update_readme.py
          cat ../README.md
      - name: Commit and push if changed
        run: |-
          git diff
          git config --global user.email "actions@users.noreply.github.com"
          git config --global user.name "README-bot"
          git add -A
          git commit -m "Updated README.md" || exit 0
          git push
